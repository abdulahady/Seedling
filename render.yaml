services:
  - type: web
    name: seedling-backend
    runtime: python
    rootDir: SeedlingBackend-main/SeedlingBackend-main
    buildCommand: pip install -r requirements.txt && python manage.py migrate
    startCommand: gunicorn SeedlingProject.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DEBUG
        value: "false"
      - key: USE_SQLITE_LOCAL
        value: "true"
      - key: ENABLE_LEGACY_WAGTAIL_API
        value: "false"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "false"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://seedlingeducation.org,https://www.seedlingeducation.org"
      - key: ALLOWED_HOSTS
        value: "127.0.0.1,localhost,seedlingeducation.org,www.seedlingeducation.org,api.seedlingeducation.org"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

  - type: static_site
    name: seedling-frontend
    rootDir: .
    buildCommand: npm ci && npm run build
    publishPath: dist
    envVars:
      - key: VITE_USE_SUPABASE_BACKEND
        value: "true"
      - key: VITE_API_BASE_URL
        value: "https://api.seedlingeducation.org/api/v3"
